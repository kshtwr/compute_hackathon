<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      font-family: 'Inter', sans-serif;
      padding: 16px;
      background-color: #F9FAFB;
      margin: 0;
    }
    h1 {
      font-size: 18px;
      color: #2563EB;
      margin-top: 0;
    }
    p {
      color: #4b5563;
      font-size: 14px;
    }
    button {
      background-color: #2563EB;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      margin-top: 10px;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #10b981;
      display: none;
    }
  </style>
</head>
<body>
  <h1>Nalanda</h1>
  <p>The entire internet is your library.</p>
  <button id="dashboardBtn">Open Dashboard</button>
  <div class="status" id="statusMsg">Connected to Supabase</div>
  <script src="popup.js"></script>
</body>
</html>
